<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KrypticMovies — Watch Movies & TV Shows</title>
  <meta name="description"
    content="Watch movies and TV shows online for free. Browse trending titles, search your favorites, and stream instantly." />
  <!-- Favicon (inline SVG data URI) -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%236c5ce7'><polygon points='5 3 19 12 5 21 5 3'/></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/index.css" />
</head>

<body>
  <!-- Header -->
  <header class="header" id="header">
    <div class="header-inner">
      <a href="#/" class="logo" id="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"></polygon>
        </svg>
        <span>KrypticMovies</span>
      </a>
      <nav class="nav" id="nav">
        <a href="#/" class="nav-link active" data-page="home">Home</a>
        <a href="#/movies" class="nav-link" data-page="movies">Movies</a>
        <a href="#/tv" class="nav-link" data-page="tv">TV Shows</a>
        <a href="#/genre" class="nav-link" data-page="genre">Genres</a>
        <a href="#/watchlist" class="nav-link" data-page="watchlist">My List</a>
      </nav>
      <div class="search-container" id="search-container">
        <div class="search-box">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.3-4.3"></path>
          </svg>
          <input type="text" id="search-input" placeholder="Search movies & TV shows..." autocomplete="off" />
        </div>
      </div>
      <!-- Mobile menu button -->
      <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
    </div>
  </header>

  <!-- Mobile overlay -->
  <div class="mobile-overlay" id="mobile-overlay"></div>

  <!-- Main Content -->
  <main id="app"></main>

  <!-- Back to top -->
  <button class="back-to-top" id="back-to-top" aria-label="Back to top">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
      stroke-linejoin="round">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
